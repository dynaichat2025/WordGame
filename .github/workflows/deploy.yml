name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  version-bump:
    runs-on: ubuntu-latest
    # 자동 버전 커밋의 재실행 방지
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 태그 가져오기 위해 전체 히스토리

      - name: Determine version bump
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE "^feat"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "🏷️ $LATEST_TAG → v${NEW_VERSION}"

      - name: Update package.json & tag
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          # package.json 버전 업데이트
          sed -i "s/\"version\": \".*\"/\"version\": \"${NEW_VERSION}\"/" package.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${NEW_TAG} [skip ci]"
          git tag -a "$NEW_TAG" -m "Release ${NEW_TAG}"
          git push origin main --tags

  deploy:
    runs-on: ubuntu-latest
    needs: version-bump
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_TEACHER_PIN: ${{ secrets.VITE_TEACHER_PIN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
